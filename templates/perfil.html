<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Coloquei a cara e Falei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #2e7d32, #1976d2);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 30px 0;
        }
        .perfil-card {
            background: white;
            border-radius: 28px;
            max-width: 550px;
            margin: auto;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #2e7d32;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .btn-salvar {
            background: linear-gradient(135deg, #2e7d32, #1976d2);
            border: none;
            border-radius: 40px;
            padding: 10px 25px;
            font-weight: 600;
        }
        .redes-input i {
            width: 30px;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="perfil-card">
            <div class="text-center">
                <img id="fotoPreview" src="{{ usuario.foto_path }}" class="foto-perfil" onclick="document.getElementById('fotoInput').click();">
                <input type="file" id="fotoInput" accept="image/*" style="display: none;">
                <h3>{{ usuario.nome }}</h3>
                <p class="text-muted">Clique na foto para trocar</p>
            </div>
            <hr>
            <form id="formPerfil">
                <div class="mb-3">
                    <label>Nome de exibição</label>
                    <input type="text" id="nome" class="form-control" value="{{ usuario.nome }}">
                </div>
                <h5 class="mt-4"><i class="fas fa-share-alt"></i> Redes Sociais (opcional)</h5>
                <div class="redes-input mb-2">
                    <i class="fab fa-instagram"></i> Instagram: 
                    <input type="text" id="instagram" class="form-control d-inline-block w-75" placeholder="@usuario" value="{{ usuario.redes_sociais.instagram if usuario.redes_sociais else '' }}">
                </div>
                <div class="redes-input mb-2">
                    <i class="fab fa-whatsapp"></i> WhatsApp: 
                    <input type="text" id="whatsapp" class="form-control d-inline-block w-75" placeholder="DDD + número (ex: 5511999999999)" value="{{ usuario.redes_sociais.whatsapp if usuario.redes_sociais else '' }}">
                </div>
                <div class="redes-input mb-2">
                    <i class="fab fa-facebook"></i> Facebook: 
                    <input type="text" id="facebook" class="form-control d-inline-block w-75" placeholder="nome de usuário" value="{{ usuario.redes_sociais.facebook if usuario.redes_sociais else '' }}">
                </div>
                <div class="redes-input mb-3">
                    <i class="fab fa-twitter"></i> Twitter: 
                    <input type="text" id="twitter" class="form-control d-inline-block w-75" placeholder="@usuario" value="{{ usuario.redes_sociais.twitter if usuario.redes_sociais else '' }}">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-salvar text-white"><i class="fas fa-save"></i> Salvar Alterações</button>
                    <a href="/home" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Voltar para Home</a>
                </div>
            </form>
            <div id="mensagem" class="mt-3"></div>
        </div>
    </div>
    <script>
        const fotoInput = document.getElementById('fotoInput');
        const fotoPreview = document.getElementById('fotoPreview');
        fotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    fotoPreview.src = event.target.result;
                    uploadFoto(file);
                };
                reader.readAsDataURL(file);
            }
        });
        function uploadFoto(file) {
            const formData = new FormData();
            formData.append('foto', file);
            fetch('/api/perfil/foto', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('mensagem').innerHTML = '<div class="alert alert-success">Foto atualizada!</div>';
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        document.getElementById('mensagem').innerHTML = '<div class="alert alert-danger">Erro ao atualizar foto</div>';
                    }
                });
        }
        document.getElementById('formPerfil').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                nome: document.getElementById('nome').value,
                redes_sociais: {
                    instagram: document.getElementById('instagram').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    facebook: document.getElementById('facebook').value,
                    twitter: document.getElementById('twitter').value
                }
            };
            fetch('/api/perfil', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    document.getElementById('mensagem').innerHTML = '<div class="alert alert-success">Perfil atualizado!</div>';
                    setTimeout(() => location.reload(), 1000);
                } else {
                    document.getElementById('mensagem').innerHTML = '<div class="alert alert-danger">Erro ao salvar</div>';
                }
            });
        });
    </script>
</body>
</html>
