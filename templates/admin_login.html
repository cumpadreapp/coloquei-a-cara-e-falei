<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Coloquei a cara e Falei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-portal: #2e7d32;
            --azul-portal: #1976d2;
        }
        
        body {
            background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal));
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal));
            border: none;
            width: 100%;
            padding: 12px;
            color: white;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 5px 15px rgba(46,125,50,0.3);
        }
        
        .login-icon {
            font-size: 60px;
            color: var(--verde-portal);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock login-icon"></i>
                        <h3 class="mt-2">Acesso Admin</h3>
                        <p class="text-muted">Coloquei a cara e Falei</p>
                    </div>
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Senha de Acesso</label>
                            <input type="password" name="senha" class="form-control" placeholder="Digite a senha do admin" required>
                        </div>
                        <button type="submit" class="btn btn-login">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <small class="text-muted">🔑 Senha padrão: admin123</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
