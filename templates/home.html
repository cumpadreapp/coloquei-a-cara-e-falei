<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloquei a cara e Falei - Linha do Tempo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Seu CSS existente permanece igual, vou apenas adicionar o estilo para o modal de redes */
        .redes-sociais-modal .modal-content {
            border-radius: 20px;
        }
        .redes-sociais-modal .redes-lista a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }
        .redes-sociais-modal .redes-lista a:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .redes-sociais-modal .redes-lista i {
            width: 25px;
            font-size: 1.3rem;
        }
        /* manter todos os outros estilos existentes */
        :root { --verde-portal: #2e7d32; --azul-portal: #1976d2; --cinza-claro: #f8f9fa; }
        body { background: linear-gradient(135deg, var(--cinza-claro) 0%, #e9ecef 100%); font-family: 'Poppins', sans-serif; }
        .banner-fixo-topo { position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .banner-imagem { width: 100%; max-height: 180px; object-fit: cover; }
        .content-wrapper { padding-top: 200px; }
        @media (max-width: 768px) { .content-wrapper { padding-top: 160px; } }
        .avatar-flutuante { position: fixed; top: 20px; right: 20px; z-index: 1001; cursor: pointer; }
        .avatar-flutuante-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .avatar-menu { position: absolute; top: 60px; right: 0; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); min-width: 180px; display: none; overflow: hidden; }
        .avatar-menu.show { display: block; }
        .avatar-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; }
        .avatar-menu-item:last-child { border-bottom: none; }
        .avatar-menu-item:hover { background: #f5f5f5; }
        .user-info { padding: 12px 16px; background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal)); color: white; text-align: center; }
        /* demais estilos (postagem-card, etc.) mantenha os que você já tinha */
        .postagem-card { background: white; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .postagem-header { padding: 20px 25px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; background: linear-gradient(135deg, #fafafa, white); flex-wrap: wrap; }
        .foto-admin { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 3px solid var(--verde-portal); }
        .postagem-titulo { font-size: 1.4rem; font-weight: 700; margin: 0; color: var(--verde-portal); }
        .postagem-resumo { font-size: 1rem; color: #666; margin: 10px 0; font-weight: 500; }
        .postagem-conteudo { padding: 25px; font-size: 1.1rem; line-height: 1.7; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin: 15px 0; background: #000; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .btn-observando { background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal)); border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: 600; }
        .btn-whatsapp { background: #25D366; border: none; padding: 8px 16px; border-radius: 40px; color: white; font-weight: 600; }
        .contador-vistas { background: var(--cinza-claro); padding: 5px 12px; border-radius: 30px; font-size: 0.85rem; color: #666; }
        .comentario-item { background: var(--cinza-claro); border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; gap: 15px; align-items: flex-start; cursor: pointer; transition: background 0.2s; }
        .comentario-item:hover { background: #e9ecef; }
        .foto-comentario { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--verde-portal); }
        .modal-ampliada { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; justify-content: center; align-items: center; cursor: pointer; }
        .area-comentario { display: none; }
        .area-comentario.show { display: block; }
        /* adicione outros estilos necessários */
    </style>
</head>
<body>
    <div class="banner-fixo-topo">
        <img src="{{ banner_url }}" class="banner-imagem" id="banner-img">
    </div>
    
    <div class="avatar-flutuante" onclick="toggleMenu()">
        <img src="{{ usuario.foto_path }}" class="avatar-flutuante-img" alt="Sua foto">
        <div id="avatarMenu" class="avatar-menu">
            <div class="user-info">
                <strong>{{ usuario.nome if usuario else 'Usuário' }}</strong><br>
                <small>Colocou a cara e falou</small>
            </div>
            <a href="/home" class="avatar-menu-item"><i class="fas fa-home"></i> Início</a>
            <a href="/perfil" class="avatar-menu-item"><i class="fas fa-user-edit"></i> Meu Perfil</a>
            <a href="/logout" class="avatar-menu-item sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </div>
    
    <div class="content-wrapper">
        <div class="container">
            <div id="postagens-container"></div>
            <div id="loading" class="loading-spinner" style="display: none;">
                <div class="spinner-border text-success"></div>
                <p>Carregando...</p>
            </div>
            <div id="trigger" class="infinite-scroll-trigger"></div>
        </div>
    </div>
    
    <!-- Modal Redes Sociais -->
    <div class="modal fade redes-sociais-modal" id="redesModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #2e7d32, #1976d2); color: white;">
                    <h5 class="modal-title"><i class="fas fa-share-alt"></i> Redes Sociais</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="redesModalBody">
                    <div class="text-center"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let pagina = 1;
        let carregando = false;
        let temMais = true;
        let mensagemBoasVindas = "{{ mensagem_boas_vindas }}";
        if (mensagemBoasVindas && mensagemBoasVindas !== "None") {
            setTimeout(() => alert(mensagemBoasVindas), 500);
        }
        
        function toggleMenu() {
            document.getElementById('avatarMenu').classList.toggle('show');
        }
        document.addEventListener('click', function(e) {
            const avatar = document.querySelector('.avatar-flutuante');
            if (avatar && !avatar.contains(e.target)) {
                document.getElementById('avatarMenu').classList.remove('show');
            }
        });
        
        function carregarPostagens() {
            if (carregando || !temMais) return;
            carregando = true;
            document.getElementById('loading').style.display = 'block';
            fetch(`/api/postagens?page=${pagina}`)
                .then(r => r.json())
                .then(data => {
                    if (data.postagens.length === 0) temMais = false;
                    else {
                        data.postagens.forEach(post => adicionarPostagem(post));
                        pagina++;
                        temMais = data.has_next;
                    }
                    carregando = false;
                    document.getElementById('loading').style.display = 'none';
                });
        }
        
        function compartilharWhatsApp(postId, titulo, resumo, tipo, conteudo) {
            var urlAtual = window.location.origin;
            var texto = `📰 *${titulo}*\n\n${resumo}\n\n🔗 Confira: ${urlAtual}/home`;
            if (tipo === 'foto' && conteudo) texto = `📸 *${titulo}*\n\n${resumo}\n\n🖼️ Imagem: ${window.location.origin}${conteudo}\n\n🔗 ${urlAtual}`;
            else if (tipo === 'video_local' && conteudo) texto = `🎥 *${titulo}*\n\n${resumo}\n\n📹 Vídeo: ${window.location.origin}${conteudo}\n\n🔗 ${urlAtual}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
        }
        
        function abrirRedesSociais(usuarioId, nome, foto) {
            fetch(`/api/usuario/${usuarioId}/redes`)
                .then(r => r.json())
                .then(data => {
                    const redes = data.redes || {};
                    const modalBody = document.getElementById('redesModalBody');
                    let html = `<div class="text-center mb-3"><img src="${foto}" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #2e7d32;"></div>`;
                    html += `<h5 class="text-center">${nome}</h5><div class="redes-lista mt-3">`;
                    if (redes.instagram) html += `<a href="https://instagram.com/${redes.instagram}" target="_blank"><i class="fab fa-instagram" style="color:#E4405F;"></i> Instagram: @${redes.instagram}</a>`;
                    if (redes.whatsapp) html += `<a href="https://wa.me/${redes.whatsapp}" target="_blank"><i class="fab fa-whatsapp" style="color:#25D366;"></i> WhatsApp: ${redes.whatsapp}</a>`;
                    if (redes.facebook) html += `<a href="https://facebook.com/${redes.facebook}" target="_blank"><i class="fab fa-facebook" style="color:#1877F2;"></i> Facebook: ${redes.facebook}</a>`;
                    if (redes.twitter) html += `<a href="https://twitter.com/${redes.twitter}" target="_blank"><i class="fab fa-twitter" style="color:#1DA1F2;"></i> Twitter: @${redes.twitter}</a>`;
                    if (!redes.instagram && !redes.whatsapp && !redes.facebook && !redes.twitter) {
                        html += `<p class="text-muted text-center">Este usuário ainda não adicionou redes sociais.</p>`;
                    }
                    html += `</div>`;
                    modalBody.innerHTML = html;
                    new bootstrap.Modal(document.getElementById('redesModal')).show();
                });
        }
        
        function adicionarPostagem(post) {
            const container = document.getElementById('postagens-container');
            const postDiv = document.createElement('div');
            postDiv.className = 'postagem-card';
            postDiv.id = `post-${post.id}`;
            let conteudoHtml = '';
            if (post.tipo === 'texto') conteudoHtml = `<div class="postagem-conteudo">${escapeHtml(post.conteudo)}</div>`;
            else if (post.tipo === 'foto') conteudoHtml = `<div class="postagem-conteudo"><img src="${post.conteudo}" class="postagem-midia" style="max-width:100%; border-radius:12px;"></div>`;
            else if (post.tipo === 'video_local') conteudoHtml = `<div class="video-container"><video controls><source src="${post.conteudo}"></video></div>`;
            else if (post.tipo === 'video_youtube') {
                let videoUrl = post.conteudo;
                if (videoUrl.includes('youtube.com/watch?v=')) {
                    let id = videoUrl.split('v=')[1]; if (id.includes('&')) id = id.split('&')[0];
                    videoUrl = `https://www.youtube.com/embed/${id}`;
                } else if (videoUrl.includes('youtu.be/')) {
                    let id = videoUrl.split('youtu.be/')[1]; if (id.includes('?')) id = id.split('?')[0];
                    videoUrl = `https://www.youtube.com/embed/${id}`;
                }
                conteudoHtml = `<div class="video-container"><iframe src="${videoUrl}" allowfullscreen></iframe></div>`;
            }
            let comentariosHtml = '';
            post.comentarios.forEach(com => {
                comentariosHtml += `
                    <div class="comentario-item" onclick="abrirRedesSociais(${com.usuario_id}, '${escapeHtml(com.usuario_nome_real)}', '${com.foto}')">
                        <img src="${com.foto}" class="foto-comentario">
                        <div style="flex:1;">
                            <strong>${escapeHtml(com.nome)}</strong> <small class="text-muted"> - ${com.data}</small>
                            <p class="mt-2 mb-0">${escapeHtml(com.texto)}</p>
                        </div>
                    </div>
                `;
            });
            if (!post.comentarios.length) comentariosHtml = '<div class="text-center py-3 text-muted">Nenhum comentário ainda</div>';
            const areaComentarioClass = post.ja_viu ? 'area-comentario show' : 'area-comentario';
            postDiv.innerHTML = `
                <div class="postagem-header">
                    <img src="${post.foto_autor}" class="foto-admin">
                    <div><h3 class="postagem-titulo">${escapeHtml(post.titulo)}</h3><div class="postagem-meta">${post.autor} • ${post.data}</div></div>
                </div>
                <div class="postagem-resumo px-4 pb-2">📌 ${escapeHtml(post.resumo)}</div>
                ${conteudoHtml}
                <div class="p-4 border-top">
                    <div class="acoes-postagem d-flex justify-content-between flex-wrap gap-2">
                        <button class="btn-observando" onclick="marcarViu(${post.id}, this)" ${post.ja_viu ? 'disabled' : ''}>
                            <i class="fas ${post.ja_viu ? 'fa-check-circle' : 'fa-eye'}"></i> Tô só Observando
                        </button>
                        <button class="btn-whatsapp" onclick="compartilharWhatsApp(${post.id}, '${escapeHtml(post.titulo)}', '${escapeHtml(post.resumo)}', '${post.tipo}', '${post.conteudo}')">
                            <i class="fab fa-whatsapp"></i> Compartilhar
                        </button>
                        <span class="contador-vistas"><i class="fas fa-users"></i> ${post.total_vistas} pessoas estão observando</span>
                    </div>
                    <div class="mb-3 mt-4"><h6><i class="fas fa-comments"></i> Comentários (${post.comentarios.length})</h6><div class="comentarios-lista mt-3">${comentariosHtml}</div></div>
                    <div id="area-comentario-${post.id}" class="${areaComentarioClass}">
                        <div class="mensagem-aviso">✅ Você está observando! Agora pode comentar.</div>
                        <textarea class="form-control mt-2" id="comentario-${post.id}" rows="2" placeholder="Escreva seu comentário..."></textarea>
                        <input type="text" class="form-control mt-2" id="nome-${post.id}" placeholder="Seu nome (opcional)">
                        <button class="btn btn-success mt-2" onclick="comentar(${post.id})">Enviar</button>
                    </div>
                    ${!post.ja_viu ? '<div class="alert alert-warning mt-3">🔒 Clique em "Tô só Observando" para comentar.</div>' : ''}
                </div>
            `;
            container.appendChild(postDiv);
        }
        
        function marcarViu(postId, botao) {
            fetch(`/api/postagem/${postId}/viu`, { method: 'POST' }).then(r => r.json()).then(data => {
                if (data.success) {
                    botao.disabled = true;
                    botao.innerHTML = '<i class="fas fa-check-circle"></i> Tô só Observando';
                    document.getElementById(`area-comentario-${postId}`).classList.add('show');
                    setTimeout(() => location.reload(), 500);
                } else alert(data.error);
            });
        }
        
        function comentar(postId) {
            const texto = document.getElementById(`comentario-${postId}`).value.trim();
            const nome = document.getElementById(`nome-${postId}`).value.trim();
            if (!texto) return alert('Digite um comentário!');
            fetch('/api/comentario', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: postId, texto, nome })
            }).then(r => r.json()).then(data => { if (data.success) location.reload(); else alert(data.error); });
        }
        
        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        const observer = new IntersectionObserver(e => { if(e[0].isIntersecting) carregarPostagens(); }, { threshold: 0.1 });
        observer.observe(document.getElementById('trigger'));
        carregarPostagens();
    </script>
</body>
</html>
