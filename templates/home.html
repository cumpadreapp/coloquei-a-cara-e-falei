<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloquei a cara e Falei - Linha do Tempo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --verde-portal: #2e7d32;
            --branco-portal: #ffffff;
            --azul-portal: #1976d2;
            --verde-claro: #4caf50;
            --azul-claro: #42a5f5;
            --cinza-claro: #f8f9fa;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, var(--cinza-claro) 0%, #e9ecef 100%);
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .banner-fixo-topo {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .banner-imagem {
            width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: cover;
            display: block;
        }
        
        .content-wrapper {
            padding-top: 200px;
        }
        
        @media (max-width: 768px) {
            .content-wrapper {
                padding-top: 160px;
            }
        }
        
        .avatar-flutuante {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            cursor: pointer;
        }
        
        .avatar-flutuante-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            background: white;
        }
        
        .avatar-flutuante-img:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        
        .avatar-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            min-width: 180px;
            display: none;
            overflow: hidden;
            animation: fadeInDown 0.2s ease-out;
        }
        
        .avatar-menu.show {
            display: block;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .avatar-menu-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
            text-decoration: none;
            transition: all 0.2s;
            border-bottom: 1px solid #eee;
        }
        
        .avatar-menu-item:last-child {
            border-bottom: none;
        }
        
        .avatar-menu-item:hover {
            background: #f5f5f5;
        }
        
        .avatar-menu-item i {
            width: 20px;
            color: var(--verde-portal);
        }
        
        .avatar-menu-item.sair {
            color: #dc3545;
        }
        
        .avatar-menu-item.sair i {
            color: #dc3545;
        }
        
        .user-info {
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal));
            color: white;
            text-align: center;
        }
        
        .user-info small {
            font-size: 0.7rem;
            opacity: 0.9;
        }
        
        .postagem-card {
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .postagem-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }
        
        .postagem-header {
            padding: 20px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #fafafa, white);
            flex-wrap: wrap;
        }
        
        .foto-admin {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--verde-portal);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .postagem-titulo {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: var(--verde-portal);
            letter-spacing: -0.3px;
        }
        
        .postagem-meta {
            font-size: 0.8rem;
            color: #888;
        }
        
        .postagem-resumo {
            font-size: 1rem;
            color: #666;
            margin: 10px 0;
            font-weight: 500;
        }
        
        .postagem-conteudo {
            padding: 25px;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #333;
        }
        
        .postagem-midia {
            max-width: 100%;
            border-radius: 12px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin: 15px 0;
            background: #000;
        }
        
        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .btn-observando {
            background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-observando:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(46,125,50,0.3);
        }
        
        .btn-observando:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: #aaa;
        }
        
        .btn-whatsapp {
            background: #25D366;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .btn-whatsapp:hover {
            transform: scale(1.05);
            background: #128C7E;
            color: white;
        }
        
        .contador-vistas {
            background: var(--cinza-claro);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .comentario-item {
            background: var(--cinza-claro);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            transition: all 0.2s;
        }
        
        .comentario-item:hover {
            background: #f0f2f5;
        }
        
        .foto-comentario {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
            border: 2px solid var(--verde-portal);
        }
        
        .foto-comentario:hover {
            transform: scale(1.1);
        }
        
        .modal-ampliada {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .modal-ampliada img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }
        
        .infinite-scroll-trigger {
            height: 20px;
            text-align: center;
            margin: 20px 0;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 30px;
        }
        
        .area-comentario {
            background: linear-gradient(135deg, #f8f9fa, #fff);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #e0e0e0;
            display: none;
        }
        
        .area-comentario.show {
            display: block;
            animation: slideDown 0.4s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn-comentar {
            background: linear-gradient(135deg, var(--verde-portal), var(--azul-portal));
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-comentar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46,125,50,0.3);
        }
        
        .mensagem-aviso {
            background: #e8f5e9;
            border-left: 4px solid var(--verde-portal);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .destacado {
            background: linear-gradient(135deg, #fff8e1, #fff);
            border-left: 4px solid #ffc107;
        }
        
        .acoes-postagem {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        
        @media (max-width: 768px) {
            .postagem-titulo {
                font-size: 1.1rem;
            }
            
            .postagem-conteudo {
                font-size: 0.95rem;
                padding: 20px;
            }
            
            .postagem-header {
                padding: 15px;
            }
            
            .foto-admin {
                width: 45px;
                height: 45px;
            }
            
            .avatar-flutuante-img {
                width: 40px;
                height: 40px;
            }
            
            .avatar-flutuante {
                top: 15px;
                right: 15px;
            }
            
            .acoes-postagem {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn-whatsapp {
                text-align: center;
            }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--verde-portal);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--azul-portal);
        }
    </style>
</head>
<body>
    <div class="banner-fixo-topo">
        <img src="{{ banner_url }}" class="banner-imagem" alt="Banner" id="banner-img">
    </div>
    
    <div class="avatar-flutuante" onclick="toggleMenu()">
        <img src="{{ usuario.foto_path if usuario and usuario.foto_path else '/static/uploads/fotos/default.jpg' }}" class="avatar-flutuante-img" alt="Sua foto">
        <div id="avatarMenu" class="avatar-menu">
            <div class="user-info">
                <strong>{{ usuario.nome if usuario else 'Usuário' }}</strong><br>
                <small>Colocou a cara e falou</small>
            </div>
            <a href="/home" class="avatar-menu-item">
                <i class="fas fa-home"></i> Início
            </a>
            <a href="/logout" class="avatar-menu-item sair">
                <i class="fas fa-sign-out-alt"></i> Sair
            </a>
        </div>
    </div>
    
    <div class="content-wrapper">
        <div class="container">
            <div id="postagens-container"></div>
            <div id="loading" class="loading-spinner" style="display: none;">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p class="mt-2 text-muted">Carregando mais postagens...</p>
            </div>
            <div id="trigger" class="infinite-scroll-trigger"></div>
        </div>
    </div>
    
    <div id="modal-foto" class="modal-ampliada" onclick="fecharModal()">
        <img id="foto-ampliada" src="">
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let pagina = 1;
        let carregando = false;
        let temMais = true;
        
        function toggleMenu() {
            const menu = document.getElementById('avatarMenu');
            menu.classList.toggle('show');
        }
        
        document.addEventListener('click', function(event) {
            const avatar = document.querySelector('.avatar-flutuante');
            const menu = document.getElementById('avatarMenu');
            if (avatar && !avatar.contains(event.target)) {
                menu.classList.remove('show');
            }
        });
        
        function carregarPostagens() {
            if (carregando || !temMais) return;
            
            carregando = true;
            document.getElementById('loading').style.display = 'block';
            
            fetch(`/api/postagens?page=${pagina}`)
                .then(response => response.json())
                .then(data => {
                    if (data.postagens.length === 0) {
                        temMais = false;
                    } else {
                        data.postagens.forEach(post => {
                            adicionarPostagem(post);
                        });
                        pagina++;
                        temMais = data.has_next;
                    }
                    carregando = false;
                    document.getElementById('loading').style.display = 'none';
                })
                .catch(error => {
                    console.error('Erro:', error);
                    carregando = false;
                    document.getElementById('loading').style.display = 'none';
                });
        }
        
        // Função melhorada para compartilhar no WhatsApp com imagem
        function compartilharWhatsApp(postId, titulo, resumo, tipo, conteudo) {
            var urlAtual = window.location.origin + window.location.pathname;
            
            // Construir mensagem base
            var texto = `📰 *${titulo}*\n\n${resumo}\n\n🔗 Confira no Coloquei a cara e Falei: ${urlAtual}`;
            
            // Se for imagem, adicionar link da imagem
            if (tipo === 'foto' && conteudo) {
                var urlImagem = window.location.origin + conteudo;
                texto = `📸 *${titulo}*\n\n${resumo}\n\n🖼️ Imagem: ${urlImagem}\n\n🔗 Confira no Coloquei a cara e Falei: ${urlAtual}`;
            }
            // Se for vídeo local, adicionar link do vídeo
            else if (tipo === 'video_local' && conteudo) {
                var urlVideo = window.location.origin + conteudo;
                texto = `🎥 *${titulo}*\n\n${resumo}\n\n📹 Vídeo: ${urlVideo}\n\n🔗 Confira no Coloquei a cara e Falei: ${urlAtual}`;
            }
            
            var textoCodificado = encodeURIComponent(texto);
            var urlWhatsApp = `https://wa.me/?text=${textoCodificado}`;
            window.open(urlWhatsApp, '_blank');
        }
        
        function adicionarPostagem(post) {
            const container = document.getElementById('postagens-container');
            const postDiv = document.createElement('div');
            postDiv.className = 'postagem-card';
            postDiv.id = `post-${post.id}`;
            
            let conteudoHtml = '';
            if (post.tipo === 'texto') {
                conteudoHtml = `<div class="postagem-conteudo">${escapeHtml(post.conteudo)}</div>`;
            } else if (post.tipo === 'foto') {
                conteudoHtml = `<div class="postagem-conteudo"><img src="${post.conteudo}" class="postagem-midia" alt="Imagem da postagem"></div>`;
            } else if (post.tipo === 'video_local') {
                conteudoHtml = `<div class="video-container"><video controls><source src="${post.conteudo}"></video></div>`;
            } else if (post.tipo === 'video_youtube') {
                let videoUrl = post.conteudo;
                if (videoUrl.includes('youtube.com/watch?v=')) {
                    let videoId = videoUrl.split('v=')[1];
                    let ampersandPosition = videoId.indexOf('&');
                    if (ampersandPosition !== -1) {
                        videoId = videoId.substring(0, ampersandPosition);
                    }
                    videoUrl = `https://www.youtube.com/embed/${videoId}`;
                } else if (videoUrl.includes('youtu.be/')) {
                    let videoId = videoUrl.split('youtu.be/')[1];
                    if (videoId.includes('?')) {
                        videoId = videoId.split('?')[0];
                    }
                    videoUrl = `https://www.youtube.com/embed/${videoId}`;
                } else if (videoUrl.includes('/embed/')) {
                    videoUrl = videoUrl;
                } else {
                    videoUrl = `https://www.youtube.com/embed/${videoUrl}`;
                }
                conteudoHtml = `
                    <div class="video-container">
                        <iframe src="${videoUrl}" 
                                title="YouTube video"
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                        </iframe>
                    </div>
                `;
            }
            
            let comentariosHtml = '';
            if (post.comentarios.length > 0) {
                post.comentarios.forEach(com => {
                    comentariosHtml += `
                        <div class="comentario-item">
                            <img src="${com.foto}" class="foto-comentario" onclick="ampliarFoto('${com.foto}')" alt="Foto do usuário">
                            <div style="flex: 1;">
                                <strong><i class="fas fa-user"></i> ${escapeHtml(com.nome)}</strong>
                                <small class="text-muted"> - ${com.data}</small>
                                <p class="mt-2 mb-0">${escapeHtml(com.texto)}</p>
                            </div>
                        </div>
                    `;
                });
            } else {
                comentariosHtml = '<div class="text-center py-3 text-muted"><i class="fas fa-comment-slash"></i> Nenhum comentário ainda</div>';
            }
            
            const areaComentarioClass = post.ja_viu ? 'area-comentario show' : 'area-comentario';
            
            postDiv.innerHTML = `
                <div class="postagem-header">
                    <img src="${post.foto_autor}" class="foto-admin" alt="Admin">
                    <div style="flex: 1;">
                        <h3 class="postagem-titulo">${escapeHtml(post.titulo)}</h3>
                        <div class="postagem-meta">
                            <i class="fas fa-user-shield"></i> ${post.autor} • 
                            <i class="far fa-calendar-alt"></i> ${post.data}
                        </div>
                    </div>
                </div>
                <div class="postagem-resumo px-4 pb-2">📌 ${escapeHtml(post.resumo)}</div>
                ${conteudoHtml}
                <div class="p-4 border-top">
                    <div class="acoes-postagem">
                        <button class="btn-observando" onclick="marcarViu(${post.id}, this)" ${post.ja_viu ? 'disabled' : ''}>
                            <i class="fas ${post.ja_viu ? 'fa-check-circle' : 'fa-eye'}"></i> 
                            ${post.ja_viu ? 'Tô só Observando' : 'Tô só Observando'}
                        </button>
                        <button class="btn-whatsapp" onclick="compartilharWhatsApp(${post.id}, '${escapeHtml(post.titulo)}', '${escapeHtml(post.resumo)}', '${post.tipo}', '${post.conteudo}')">
                            <i class="fab fa-whatsapp"></i> Compartilhar WhatsApp
                        </button>
                        <span class="contador-vistas">
                            <i class="fas fa-users"></i> ${post.total_vistas} ${post.total_vistas === 1 ? 'pessoa está observando' : 'pessoas estão observando'}
                        </span>
                    </div>
                    
                    <div class="mb-3 mt-4">
                        <h6><i class="fas fa-comments" style="color: var(--verde-portal);"></i> Comentários (${post.comentarios.length})</h6>
                        <div class="comentarios-lista mt-3">
                            ${comentariosHtml}
                        </div>
                    </div>
                    
                    <div id="area-comentario-${post.id}" class="${areaComentarioClass}">
                        <div class="mensagem-aviso">
                            <i class="fas fa-check-circle text-success"></i> 
                            ✅ Você está observando! Agora pode comentar.
                        </div>
                        <div class="mt-3">
                            <textarea class="form-control" id="comentario-${post.id}" rows="2" placeholder="Escreva seu comentário..."></textarea>
                            <div class="mt-3 d-flex gap-2 flex-wrap">
                                <input type="text" class="form-control flex-grow-1" id="nome-${post.id}" placeholder="Seu nome (opcional - deixe em branco para anônimo)">
                                <button class="btn-comentar" onclick="comentar(${post.id})">
                                    <i class="fas fa-paper-plane"></i> Enviar
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    ${!post.ja_viu ? `
                        <div class="mensagem-aviso destacado mt-3">
                            <i class="fas fa-info-circle text-info"></i> 
                            🔒 Clique em <strong>"Tô só Observando"</strong> para liberar os comentários desta postagem.
                        </div>
                    ` : ''}
                </div>
            `;
            
            container.appendChild(postDiv);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function marcarViu(postId, botao) {
            fetch(`/api/postagem/${postId}/viu`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        botao.disabled = true;
                        botao.innerHTML = '<i class="fas fa-check-circle"></i> Tô só Observando';
                        
                        const areaComentario = document.getElementById(`area-comentario-${postId}`);
                        if (areaComentario) {
                            areaComentario.classList.add('show');
                        }
                        
                        setTimeout(() => {
                            location.reload();
                        }, 500);
                    } else {
                        alert(data.error);
                    }
                })
                .catch(error => alert('Erro ao marcar como observando'));
        }
        
        function comentar(postId) {
            const texto = document.getElementById(`comentario-${postId}`).value.trim();
            const nome = document.getElementById(`nome-${postId}`).value.trim();
            
            if (!texto) {
                alert('Digite um comentário!');
                return;
            }
            
            fetch('/api/comentario', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: postId, texto: texto, nome: nome })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert(data.error);
                    }
                });
        }
        
        function ampliarFoto(url) {
            const modal = document.getElementById('modal-foto');
            const img = document.getElementById('foto-ampliada');
            img.src = url;
            modal.style.display = 'flex';
        }
        
        function fecharModal() {
            document.getElementById('modal-foto').style.display = 'none';
        }
        
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                carregarPostagens();
            }
        }, { threshold: 0.1 });
        
        observer.observe(document.getElementById('trigger'));
        carregarPostagens();
    </script>
</body>
</html>
